<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Occidental Mindoro State College</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .slideshow { position: fixed; inset: 0; z-index: 0; }
        .slideshow img {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 1.2s ease-in-out;
        }
        .slideshow img.active { opacity: 1; z-index: 1; }
        .overlay {
            position: fixed; inset: 0; z-index: 1;
            background: linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.55) 100%);
            pointer-events: none;
        }
        .page-content {
            position: relative; z-index: 2; min-height: 100vh; padding: 24px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        .back { position: absolute; top: 24px; left: 24px; color: #fff; text-decoration: none; font-weight: 600; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
        .back:hover { text-decoration: underline; }
        .container { width: 100%; max-width: 860px; background: #fff; padding: 26px 34px; border-radius: 14px; box-shadow: 0 6px 32px rgba(0,0,0,0.25); }
        .logo-wrap { text-align: center; margin-bottom: 18px; }
        .logo-wrap img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        h1 { color: #1e3c72; font-size: 1.25rem; text-align: center; margin-bottom: 6px; }
        .sub { color: #666; font-size: 0.95rem; text-align: center; margin-bottom: 14px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #333; font-weight: 600; font-size: 0.92rem; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.98rem; background: #fff; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #1e3c72; box-shadow: 0 0 0 2px rgba(30,60,114,0.2); }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #b45309 0%, #ea580c 100%); color: #fff; border: none; border-radius: 8px; font-size: 1.02rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-login:hover { opacity: 0.95; }
        .divider { text-align: center; margin: 24px 0; color: #888; font-size: 0.9rem; }
        .create-link { display: block; text-align: center; color: #1e3c72; font-weight: 600; text-decoration: none; font-size: 0.95rem; }
        .create-link:hover { text-decoration: underline; }
        .panel { display: none; }
        .panel.active { display: block; }
        .btn-back-text { background: none; border: none; color: #666; cursor: pointer; font-size: 0.9rem; margin-bottom: 20px; padding: 0; }
        .btn-back-text:hover { color: #1e3c72; text-decoration: underline; }
        .error-msg { color: #c00; font-size: 0.85rem; margin-top: 6px; display: none; }
        .error-msg.show { display: block; }
        .hint { font-size: 0.82rem; color: #666; margin-top: 4px; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .section-title { margin: 14px 0 8px; font-size: 1rem; font-weight: 800; color: #1e3c72; }
    </style>
</head>
<body>
    <div class="slideshow" id="slideshow"></div>
    <div class="overlay"></div>
    <div class="page-content">
    <a href="../index.html" class="back">← Back to Home</a>

    <div class="container">
        <div id="loginPanel" class="panel active">
            <div class="logo-wrap">
                <img src="../images/omsc.png" alt="OMSC" onerror="this.style.display='none'">
            </div>
            <h1>OCCIDENTAL MINDORO STATE COLLEGE</h1>
            <p class="sub">Multimedia and Speech Laboratory — Attendance</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email o Username</label>
                    <input type="text" id="loginEmail" name="email" placeholder="Email o username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" placeholder="Password" autocomplete="current-password" required>
                </div>
                <p id="loginError" class="error-msg">Maling email o password.</p>
                <button type="submit" class="btn-login">Log in</button>
            </form>
            <div class="divider">— o —</div>
            <a href="#" id="showCreateAccount" class="create-link">Create account</a>

        </div>

        <div id="createPanel" class="panel">
            <button type="button" class="btn-back-text" id="backToLogin">← Back to Log in</button>
            <div class="logo-wrap">
                <img src="../images/omsc.png" alt="OMSC" onerror="this.style.display='none'">
            </div>
            <h1>Create account</h1>
            <p class="sub">Multimedia and Speech Laboratory — Attendance</p>
            <form id="createForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="row-3">
                        <input type="text" id="createFirstName" name="firstName" placeholder="First Name" required>
                        <input type="text" id="createMiddleName" name="middleName" placeholder="Middle Name">
                        <input type="text" id="createLastName" name="lastName" placeholder="Last Name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="createPicture">Profile Picture (optional)</label>
                    <input type="file" id="createPicture" name="picture" accept="image/*">
                </div>
                <div class="row-2">
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createEmail">Valid Email Address</label>
                        <input type="email" id="createEmail" name="email" placeholder="e.g. name@omsc.edu.ph" autocomplete="email" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createUsername">Username</label>
                        <input type="text" id="createUsername" name="username" placeholder="Username" autocomplete="username" required>
                    </div>
                </div>

                <div class="row-2">
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createPassword">Password</label>
                        <input type="password" id="createPassword" name="password" placeholder="Password" minlength="6" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createConfirm">Confirm password</label>
                        <input type="password" id="createConfirm" name="confirm" placeholder="Confirm password" required>
                    </div>
                </div>

                <div class="row-2">
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createCourse">Course / Program</label>
                        <select id="createCourse" name="course" required>
                        <option value="">Select course...</option>
                        <option value="BSIT">BSIT</option>
                        <option value="BSBA">BSBA</option>
                        <option value="BSMA">BSMA</option>
                        <option value="BEED">BEED</option>
                        <option value="BSED">BSED</option>
                        <option value="BPEd">BPEd</option>
                        <option value="BTTE">BTTE</option>
                        <option value="BSA">BSA</option>
                        <option value="BSAF">BSAF</option>
                        <option value="BSF">BSF</option>
                        <option value="BSFi">BSFi</option>
                        <option value="BSHM">BSHM</option>
                        <option value="BSTM">BSTM</option>
                        <option value="BSFT">BSFT</option>
                        <option value="BSCRIM">BSCRIM</option>
                        <option value="BSIS">BSIS</option>
                        <option value="BSCE">BSCE</option>
                        <option value="BSArch">BSArch</option>
                        <option value="DM">DM</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createYearLevel">Year Level</label>
                        <input type="text" id="createYearLevel" name="yearLevel" placeholder="e.g. 4th Year" required>
                    </div>
                </div>

                <div class="section-title">Basic Requirements</div>
                <div class="form-group">
                    <label for="createStudentId">Student ID Number</label>
                    <input type="text" id="createStudentId" name="studentId" placeholder="Student ID Number" required>
                </div>

                <div class="section-title">School Information</div>
                <div class="row-2">
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createSchoolName">School Name</label>
                        <input type="text" id="createSchoolName" name="schoolName" placeholder="e.g. Occidental Mindoro State College" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createDepartment">Department / College</label>
                        <input type="text" id="createDepartment" name="department" placeholder="e.g. Multimedia and Speech Laboratory" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top:12px;">
                    <label for="createCoordinator">OJT Coordinator / Adviser Name</label>
                    <input type="text" id="createCoordinator" name="coordinator" placeholder="Coordinator / Adviser Name" required>
                </div>

                <div class="section-title">OJT / Company Details</div>
                <div class="row-2">
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createCompanyName">Company Name</label>
                        <input type="text" id="createCompanyName" name="companyName" placeholder="Company name" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createSupervisor">Supervisor / Mentor Name</label>
                        <input type="text" id="createSupervisor" name="supervisor" placeholder="Supervisor / Mentor Name" required>
                    </div>
                </div>
                <div class="row-2" style="margin-top:12px;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createCompanyAddress">Company Address</label>
                        <input type="text" id="createCompanyAddress" name="companyAddress" placeholder="Company address" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createPositionRole">Position / Role Assigned</label>
                        <input type="text" id="createPositionRole" name="positionRole" placeholder="e.g. IT Support Trainee" required>
                    </div>
                </div>

                <div class="section-title">Additional Info</div>
                <div class="row-2">
                    <div class="form-group" style="margin-bottom:16px;">
                        <label for="createContactNumber">Contact Number</label>
                        <input type="text" id="createContactNumber" name="contactNumber" placeholder="Contact number" required>
                    </div>
                    <div class="form-group" style="margin-bottom:16px;">
                        <label for="createEmergencyContact">Emergency Contact Person</label>
                        <input type="text" id="createEmergencyContact" name="emergencyContact" placeholder="Emergency contact person" required>
                    </div>
                </div>

                <div class="row-2">
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createStartDate">Start Date of OJT</label>
                        <input type="date" id="createStartDate" name="startDate" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="createEndDate">End Date of OJT</label>
                        <input type="date" id="createEndDate" name="endDate" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top:12px;">
                    <label for="createTrainingHours">Training Hours Required</label>
                    <input type="number" id="createTrainingHours" name="trainingHours" placeholder="e.g. 360" min="0" required>
                </div>

                <p id="createError" class="error-msg"></p>
                <button type="submit" class="btn-login">Create account</button>
            </form>
        </div>
    </div>
    </div>

    <script>
        (function() {
            // Use gradient background only (no external images) to avoid 404 on deploy
            var container = document.getElementById('slideshow');
            if (container) {
                container.style.background = 'linear-gradient(135deg, #1e3c72 0%, #2a5298 40%, #3d6cb8 70%, #5a8fd4 100%)';
                container.style.backgroundSize = 'cover';
            }
        })();
        (function() {
            var loginPanel = document.getElementById('loginPanel');
            var createPanel = document.getElementById('createPanel');
            var showCreate = document.getElementById('showCreateAccount');
            var backToLogin = document.getElementById('backToLogin');
            var loginForm = document.getElementById('loginForm');
            var createForm = document.getElementById('createForm');
            var loginError = document.getElementById('loginError');
            var createError = document.getElementById('createError');

            var REQUIRED_ADMIN_USERNAME = 'admin';
            var REQUIRED_ADMIN_PASSWORD = 'admin123';

            showCreate.addEventListener('click', function(e) {
                e.preventDefault();
                loginPanel.classList.remove('active');
                createPanel.classList.add('active');
                createError.classList.remove('show');
            });
            backToLogin.addEventListener('click', function() {
                createPanel.classList.remove('active');
                loginPanel.classList.add('active');
                loginError.classList.remove('show');
            });

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                loginError.classList.remove('show');
                var usernameOrEmail = document.getElementById('loginEmail').value.trim();
                var pass = document.getElementById('loginPassword').value.trim();
                if (!usernameOrEmail || !pass) return;

                // Admin shortcut
                if (usernameOrEmail.toLowerCase() === REQUIRED_ADMIN_USERNAME && pass === REQUIRED_ADMIN_PASSWORD) {
                    try { localStorage.setItem('ojt_admin_session', '1'); } catch (err) {}
                    window.location.href = '../Admin/index.html?autologin=1';
                    return;
                }

                // If username entered is 'admin' but password wrong, block.
                if (usernameOrEmail.toLowerCase() === REQUIRED_ADMIN_USERNAME && pass !== REQUIRED_ADMIN_PASSWORD) {
                    loginError.textContent = 'Invalid admin username/password.';
                    loginError.classList.add('show');
                    return;
                }

                // Trainee login (prototype): accepts any non-empty password.
                try {
                    var saved = localStorage.getItem('ojt_trainee_profile');
                    if (saved) {
                        var p = JSON.parse(saved);
                        p.email = usernameOrEmail || p.email;
                        p.username = p.username || usernameOrEmail;
                        localStorage.setItem('ojt_trainee_profile', JSON.stringify(p));
                    } else {
                        var profile = { email: usernameOrEmail, username: usernameOrEmail, fullName: '—', course: '—', yearLevel: '—' };
                        localStorage.setItem('ojt_trainee_profile', JSON.stringify(profile));
                    }
                } catch (err) {}
                window.location.href = 'dashboard.html';
            });

            createForm.addEventListener('submit', function(e) {
                e.preventDefault();
                createError.classList.remove('show');
                var email = document.getElementById('createEmail').value.trim();
                var username = document.getElementById('createUsername').value.trim();
                var pass = document.getElementById('createPassword').value;
                var confirmVal = document.getElementById('createConfirm').value;
                var firstName = document.getElementById('createFirstName').value.trim();
                var lastName = document.getElementById('createLastName').value.trim();
                var course = document.getElementById('createCourse').value;
                var yearLevel = document.getElementById('createYearLevel').value.trim();
                var studentId = document.getElementById('createStudentId').value.trim();
                var schoolName = document.getElementById('createSchoolName').value.trim();
                var department = document.getElementById('createDepartment').value.trim();
                var coordinator = document.getElementById('createCoordinator').value.trim();
                var companyName = document.getElementById('createCompanyName').value.trim();
                var companyAddress = document.getElementById('createCompanyAddress').value.trim();
                var supervisor = document.getElementById('createSupervisor').value.trim();
                var positionRole = document.getElementById('createPositionRole').value.trim();
                var contactNumber = document.getElementById('createContactNumber').value.trim();
                var emergencyContact = document.getElementById('createEmergencyContact').value.trim();
                var trainingHours = document.getElementById('createTrainingHours').value;
                var startDate = document.getElementById('createStartDate').value;
                var endDate = document.getElementById('createEndDate').value;
                if (pass !== confirmVal) {
                    createError.textContent = 'Password at confirm password ay hindi match.';
                    createError.classList.add('show');
                    return;
                }
                if (pass.length < 6) {
                    createError.textContent = 'Password dapat at least 6 characters.';
                    createError.classList.add('show');
                    return;
                }
                if (!firstName || !lastName) {
                    createError.textContent = 'Please enter First Name and Last Name.';
                    createError.classList.add('show');
                    return;
                }
                if (!course || !yearLevel) {
                    createError.textContent = 'Please enter Course/Program and Year Level.';
                    createError.classList.add('show');
                    return;
                }
                if (!studentId || !schoolName || !department || !coordinator || !companyName || !companyAddress || !supervisor || !positionRole) {
                    createError.textContent = 'Please complete your Student ID and School/Company details.';
                    createError.classList.add('show');
                    return;
                }
                if (!contactNumber || !emergencyContact || !trainingHours || !startDate || !endDate) {
                    createError.textContent = 'Please complete your Additional Info and OJT schedule.';
                    createError.classList.add('show');
                    return;
                }
                var middleName = document.getElementById('createMiddleName').value.trim();
                var fullName = [firstName, middleName, lastName].filter(Boolean).join(' ');
                var profile = { 
                    fullName: fullName || '—',
                    email: email,
                    username: username,
                    course: course,
                    yearLevel: yearLevel,
                    studentId: studentId || '—',
                    schoolName: schoolName || '—',
                    department: department || '—',
                    coordinator: coordinator || '—',
                    companyName: companyName || '—',
                    companyAddress: companyAddress || '—',
                    supervisor: supervisor || '—',
                    positionRole: positionRole || '—',
                    contactNumber: contactNumber || '—',
                    emergencyContact: emergencyContact || '—',
                    trainingHours: trainingHours || '—',
                    startDate: startDate || '—',
                    endDate: endDate || '—'
                };
                var pictureFile = null;
                try {
                    pictureFile = document.getElementById('createPicture').files[0] || null;
                } catch (e) {}
                
                function saveAndRedirect(pictureUrl) {
                    if (pictureUrl) profile.pictureUrl = pictureUrl;
                    try { localStorage.setItem('ojt_trainee_profile', JSON.stringify(profile)); } catch (err) {}

                    // Upsert into local trainee DB for Admin listing (prototype only).
                    try {
                        var DB_KEY = 'ojt_trainees_db';
                        var docsKey = 'ojt_trainee_documents_db';
                        var arr = [];
                        var raw = localStorage.getItem(DB_KEY);
                        if (raw) arr = JSON.parse(raw);
                        if (!Array.isArray(arr)) arr = [];

                        var key = profile.studentId || profile.username || profile.email || ('trainee_' + Date.now());
                        var idx = -1;
                        for (var i = 0; i < arr.length; i++) {
                            var t = arr[i] || {};
                            var tKey = t.studentId || t.username || t.email;
                            if (tKey && tKey === key) { idx = i; break; }
                        }
                        if (idx >= 0) arr[idx] = profile;
                        else arr.push(profile);
                        localStorage.setItem(DB_KEY, JSON.stringify(arr));

                        // Ensure documents map exists (optional)
                        var docsRaw = localStorage.getItem(docsKey);
                        if (!docsRaw) localStorage.setItem(docsKey, JSON.stringify({}));
                    } catch (err) {}

                    window.location.href = 'dashboard.html';
                }

                if (pictureFile) {
                    var reader = new FileReader();
                    reader.onload = function() { saveAndRedirect(reader.result); };
                    reader.readAsDataURL(pictureFile);
                } else {
                    saveAndRedirect(null);
                }
            });

            // Admin login box removed. Admin shortcut is handled by the same login form submit handler.
        })();
    </script>
</body>
</html>
